# CI floor: the full test suite on stock runners — the portability proof that the harness runs outside
# the machine it was extracted on. Dormant until the repo has a remote.
#
# The OS matrix (Linux/macOS/Windows) is what produces the cross-platform installer evidence the
# Campaign-2 transaction tests need (spaces, non-ASCII paths, rollback, recovery, …). Until this matrix
# actually runs on real macOS/Windows runners, those platform rows are PENDING — a local Linux run
# cannot substitute for them (docs/plans/excubitor-ralph-implementation.md, C2.11).
name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      # Reviewed immutable commits; both action manifests use Node 20.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install hash-locked test runner (the code itself is stdlib-only)
        run: python -m pip install --require-hashes -r requirements-ci.txt
      - name: Test suite (includes the cross-platform installer suite on every OS)
        run: python -m pytest -q
      # The telos witness gate is a bash step, so it runs on Linux only; the decision logic it audits is
      # platform-agnostic and the pytest suite above already runs on all three OSes.
      - name: Telos record parses, resolves, and every claim's witness passes
        if: runner.os == 'Linux'
        run: |
          python3 skills/audit-telos/telos_check.py parse . > /dev/null
          python3 skills/audit-telos/telos_check.py audit . > telos-audit.json
          python3 - <<'EOF'
          import json
          claims = json.load(open("telos-audit.json"))["claims"]
          if not claims:
              # R-05: an all-retired/cycled record audits zero claims; an empty list must FAIL, not pass
              print("telos audit produced ZERO active claims — a vacuous pass is a failure")
              raise SystemExit(1)
          bad = [c for c in claims if c["state"] != "DISCHARGED" or c["tier"] != "witness"]
          for c in bad:
              print(f'{c["id"]}: state={c["state"]} tier={c["tier"]} — {c["rationale"]}')
          raise SystemExit(1 if bad else 0)
          EOF
